<!DOCTYPE html>
<html>
<head>
  <title>Temperature Converter</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Temperature Converter</h2>

<input type="number" id="temp" placeholder="Enter temperature">

<select id="unit">
  <option value="C">Celsius</option>
  <option value="F">Fahrenheit</option>
</select>

<button onclick="convertTemp()">Convert</button>

<div id="result"></div>

<script>
function convertTemp() {
  let temp = document.getElementById("temp").value;
  let unit = document.getElementById("unit").value;
  let result = document.getElementById("result");

  if (temp === "") {
    result.innerHTML = "Please enter a value!";
    return;
  }

  temp = Number(temp);

  if (unit === "C") {
    let f = (temp * 9/5) + 32;
    result.innerHTML = temp + "°C = " + f.toFixed(2) + "°F";
  } else {
    let c = (temp - 32) * 5/9;
    result.innerHTML = temp + "°F = " + c.toFixed(2) + "°C";
  }
}
</script>

</body>
</html>
