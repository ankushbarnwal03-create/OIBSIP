<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OIBSIP Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #222;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: white;
      cursor: pointer;
    }

    .features {
      display: flex;
      padding: 20px;
      text-align: center;
    }

    .box {
      flex: 1;
      margin: 10px;
      padding: 20px;
      background: #f4f4f4;
      border-radius: 10px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>My Landing Page</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to My Website</h1>
  <p>Create beautiful pages using HTML & CSS</p>
  <button>Get Started</button>
</section>

<section class="features">
  <div class="box">
    <h3>Fast</h3>
    <p>Quick loading design</p>
  </div>
  <div class="box">
    <h3>Simple</h3>
    <p>Easy to understand</p>
  </div>
  <div class="box">
    <h3>Creative</h3>
    <p>Modern UI design</p>
  </div>
</section>

<footer>
  <p>© 2026 OIBSIP Project</p>
</footer>

</body>
</html>
